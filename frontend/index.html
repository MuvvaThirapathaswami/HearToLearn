<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HearToLearn - PDF Voice Reader</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f6fa;
        text-align: center;
    }

    header {
        background: #e63946;
        color: white;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        margin-top: 60px;
    }

    .upload-box {
        background: white;
        padding: 40px;
        width: 350px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    input[type="file"] {
        margin: 15px 0;
    }

    button {
        background: #e63946;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover { background: #d62839; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    audio {
        margin-top: 25px;
        width: 100%;
        display: none;
    }

    #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        min-height: 20px;
    }

    .status-loading { color: #e6a817; font-weight: bold; }
    .status-error   { color: #e63946; font-weight: bold; }
    .status-success { color: #2a9d4e; font-weight: bold; }

    footer {
        margin-top: 60px;
        color: #888;
        font-size: 14px;
    }
</style>
</head>

<body>

<header>🎧 HearToLearn – PDF Voice Reader</header>

<div class="container">
    <div class="upload-box">
        <h2>Upload your PDF</h2>
        <p>Convert PDF text into speech instantly</p>

        <input type="file" id="pdfFile" accept="application/pdf" />
        <br />
        <button id="readBtn" onclick="uploadPDF()">🔊 Read Aloud</button>

        <div id="statusMsg"></div>
        <audio id="audioPlayer" controls></audio>
    </div>
</div>

<footer>
    Powered by AI Text-to-Speech • Built with Python & Flask
</footer>

<script>
const BACKEND_URL = "https://heartolearn.onrender.com";

async function uploadPDF() {
    const fileInput = document.getElementById("pdfFile");
    const btn = document.getElementById("readBtn");
    const statusMsg = document.getElementById("statusMsg");
    const audioPlayer = document.getElementById("audioPlayer");

    // Reset
    audioPlayer.style.display = "none";
    audioPlayer.src = "";
    statusMsg.className = "";
    statusMsg.textContent = "";

    if (!fileInput.files.length) {
        showStatus("Please upload a PDF first.", "error");
        return;
    }

    btn.disabled = true;
    btn.textContent = "⏳ Generating...";
    showStatus("Uploading and generating audio... (may take ~15s on first load)", "loading");

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const response = await fetch(`${BACKEND_URL}/read_pdf`, {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            let errorMsg = `Server error (${response.status})`;
            try {
                const errData = await response.json();
                if (errData.error) errorMsg = errData.error;
            } catch (_) {}
            showStatus("❌ " + errorMsg, "error");
            return;
        }

        const contentType = response.headers.get("Content-Type") || "";
        if (!contentType.includes("audio")) {
            showStatus("❌ Server did not return audio. Check Render logs.", "error");
            return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        audioPlayer.src = url;
        audioPlayer.style.display = "block";
        audioPlayer.play();

        showStatus("✅ Audio ready!", "success");

    } catch (err) {
        console.error(err);
        showStatus("❌ Could not reach server. Render may be waking up — try again in 30s.", "error");
    } finally {
        btn.disabled = false;
        btn.textContent = "🔊 Read Aloud";
    }
}

function showStatus(msg, type) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg;
    el.className = type ? `status-${type}` : "";
}
</script>

</body>
</html>
